# xdg-desktop-portal per-desktop config for XDG_CURRENT_DESKTOP=tomoe.
# Install as ~/.config/xdg-desktop-portal/tomoe-portals.conf or
# /usr/share/xdg-desktop-portal/tomoe-portals.conf (the nix package ships it
# at the latter path). ScreenCast goes to our backend; everything else falls
# through to whichever other portals are installed (gtk for file dialogs...).
[preferred]
default=*
org.freedesktop.impl.portal.ScreenCast=tomoe
