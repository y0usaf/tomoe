[workspace]
members = ["crates/tomoe", "crates/tomoe-ipc", "crates/xdg-desktop-portal-tomoe"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-or-later"

[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# niri 26.4's Smithay pin (ff5fa7df) + one commit: async (tearing) page
# flip support, which upstream still lacks. Fork branch `tomoe-tearing`
# carries exactly that commit; rebase it when bumping the pin.
[workspace.dependencies.smithay]
git = "https://github.com/y0usaf/smithay.git"
rev = "4ca26929d77c9cf6e3e837e633d2efa386a78adf"
default-features = false

[workspace.dependencies.smithay-drm-extras]
git = "https://github.com/y0usaf/smithay.git"
rev = "4ca26929d77c9cf6e3e837e633d2efa386a78adf"
default-features = false

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
